# ==============================================================
# docker-compose.prod.yml — Entorno de PRODUCCIÓN
#
# Servicios:
#   db        → PostgreSQL 16
#   backend   → FastAPI + Uvicorn (2 workers, sin reload)
#   frontend  → nginx sirviendo el build estático de Vite
#
# Uso:
#   cp .env.example .env      # completar con valores de producción
#   docker compose -f docker-compose.prod.yml up --build -d
#
# Puertos expuestos al host:
#   80    → Frontend (nginx)
#   8000  → Backend API
#   (5432 NO se expone; solo accesible internamente entre servicios)
# ==============================================================

services:

  # ------------------------------------------------------------
  # Base de datos PostgreSQL
  # ------------------------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ------------------------------------------------------------
  # Backend FastAPI — imagen autocontenida, 2 workers
  # ------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    volumes:
      # Datos persistentes montados como volumen externo
      # TODO: eliminar cuando se complete la migración a PostgreSQL
      - ./data:/app/data
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL:     postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET:       ${JWT_SECRET}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-8}
      CORS_ORIGINS:     ${CORS_ORIGINS}
      ENVIRONMENT:      production
      DEBUG:            "false"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ------------------------------------------------------------
  # Frontend nginx — sirve los estáticos y hace proxy a /api/
  # ------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
