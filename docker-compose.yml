# ==============================================================
# docker-compose.yml — Entorno de DESARROLLO
#
# Servicios:
#   db        → PostgreSQL 16
#   backend   → FastAPI + Uvicorn con hot-reload (target: dev)
#   frontend  → Vite dev server con HMR (target: dev)
#
# Uso:
#   cp .env.example .env      # completar variables
#   docker compose up --build
#
# Puertos expuestos al host:
#   5432  → PostgreSQL
#   8000  → Backend API
#   5173  → Frontend Vite
# ==============================================================

services:

  # ------------------------------------------------------------
  # Base de datos PostgreSQL
  # ------------------------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-rgenerator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB:       ${POSTGRES_DB:-rgenerator_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rgenerator} -d ${POSTGRES_DB:-rgenerator_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ------------------------------------------------------------
  # Backend FastAPI — hot-reload, código montado como volumen
  # ------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    volumes:
      # Código fuente montado para hot-reload
      - .:/app
      # Datos persistentes (Excel legacy + pipeline runs)
      # TODO: eliminar cuando se complete la migración a PostgreSQL
      - ./data:/app/data
    ports:
      - "8000:8000"
    environment:
      # NOTA: el host de la BD es 'db' (nombre del servicio), no localhost
      DATABASE_URL:    postgresql://${POSTGRES_USER:-rgenerator}:${POSTGRES_PASSWORD:-devpassword}@db:5432/${POSTGRES_DB:-rgenerator_dev}
      JWT_SECRET:      ${JWT_SECRET:-dev_secret_CAMBIAR_en_produccion}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-8}
      CORS_ORIGINS:    http://localhost:5173
      ENVIRONMENT:     development
      DEBUG:           "true"
    depends_on:
      db:
        condition: service_healthy

  # ------------------------------------------------------------
  # Frontend Vite — dev server con HMR
  # ------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    volumes:
      # Código fuente montado para HMR
      - ./frontend:/app
      # Volumen anónimo para que node_modules del contenedor
      # no sea sobreescrito por el montaje anterior
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
