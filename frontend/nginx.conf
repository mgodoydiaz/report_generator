server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: cualquier ruta no encontrada redirige a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # NOTA: en docker-compose habia aqui un location /api/ con proxy_pass a
    # http://backend:8000. Lo eliminamos porque (1) el frontend usa URL
    # absoluta via VITE_API_BASE_URL hacia el backend desplegado, (2) en
    # Railway no existe el hostname "backend" y nginx fallaba al arrancar
    # (`host not found in upstream`).

    # Caché agresiva para assets con hash en el nombre (Vite los genera así)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
