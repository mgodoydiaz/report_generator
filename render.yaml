# render.yaml — Infrastructure as Code para Render
# Docs: https://docs.render.com/infrastructure-as-code

services:
  # ─── Backend FastAPI ───────────────────────────────────────
  - type: web
    name: rgenerator-backend
    runtime: docker
    repo: https://github.com/migodoy/website-ui   # TODO: ajustar al repo real
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rgenerator-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_HOURS
        value: "8"
      - key: CORS_ORIGINS
        value: "https://mgodoy.dev,https://apps.mgodoy.dev"
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
    disk:
      name: pipeline-data
      mountPath: /app/data
      sizeGB: 1

# ─── PostgreSQL ────────────────────────────────────────────
databases:
  - name: rgenerator-db
    plan: free
    databaseName: rgenerator
    user: rgenerator
